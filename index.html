<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이브코딩 - 코딩의 새로운 물결</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <header class="hero">
        <h1 class="glitch" data-text="VIBE CODING">바이브코딩</h1>
        <p class="subtitle">직관과 AI가 만드는 코딩의 새로운 물결 🌊</p>

            <h2>자연어 기반</h2>
            <p>사람의 언어로 생각하고, AI와 대화하며 코드를 완성하세요.</p>
        </div>
        <div class="card">
            <div class="icon">⚡</div>
            <h2>빠른 프로토타이핑</h2>
            <p>아이디어가 떠오르는 즉시 시각적인 결과물로 확인하세요.</p>
        </div>
        <div class="card">
            <div class="icon">🎨</div>
            <h2>즐거운 몰입</h2>
            <p>복잡한 문법에서 벗어나 창의적인 디자인과 흐름에 집중하세요.</p>
        </div>
    </section>

    <footer>
        <p>© 2026 Vibe Coding. Feel the flow.</p>
    </footer>
